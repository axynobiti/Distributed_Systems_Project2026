apiVersion: v1
kind: Secret
metadata:
  name: auth-seed-admin-secret
  namespace: distributed-systems-project2026
type: Opaque
stringData:
  SEED_ADMIN_USERNAME: "admin"
  SEED_ADMIN_EMAIL: "admin@example.com"
  SEED_ADMIN_PASSWORD: "admin123"

---

apiVersion: batch/v1
kind: Job
metadata:
  name: auth-seed-admin
  namespace: distributed-systems-project2026
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: auth-seed-admin
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed-admin
          image: ds-project/auth:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.seed_admin
          env:
            - name: AUTH_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_HOST
            - name: AUTH_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_PORT
            - name: AUTH_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_NAME
            - name: AUTH_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: AUTH_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(AUTH_DB_USER):$(AUTH_DB_PASSWORD)@$(AUTH_DB_HOST):$(AUTH_DB_PORT)/$(AUTH_DB_NAME)"
            - name: SEED_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-seed-admin-secret
                  key: SEED_ADMIN_USERNAME
            - name: SEED_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: auth-seed-admin-secret
                  key: SEED_ADMIN_EMAIL
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-seed-admin-secret
                  key: SEED_ADMIN_PASSWORD

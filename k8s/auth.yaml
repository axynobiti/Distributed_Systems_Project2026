apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: distributed-systems-project2026
type: Opaque
stringData:
  AUTH_SECRET_KEY: "change-this-secret-key"
  AUTH_DB_PASSWORD: "auth_password"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: distributed-systems-project2026
data:
  AUTH_DB_HOST: "auth-postgres"
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: "auth_db"
  AUTH_DB_USER: "auth_user"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: distributed-systems-project2026
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: ds-project/auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: AUTH_SECRET_KEY
            - name: AUTH_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_HOST
            - name: AUTH_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_PORT
            - name: AUTH_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_NAME
            - name: AUTH_DB_USER
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_USER
            - name: AUTH_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: AUTH_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(AUTH_DB_USER):$(AUTH_DB_PASSWORD)@$(AUTH_DB_HOST):$(AUTH_DB_PORT)/$(AUTH_DB_NAME)"

---

apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: distributed-systems-project2026
spec:
  type: ClusterIP
  selector:
    app: auth
  ports:
    - port: 8000
      targetPort: 8000

---

apiVersion: v1
kind: Service
metadata:
  name: auth-postgres
  namespace: distributed-systems-project2026
spec:
  type: ClusterIP
  selector:
    app: auth-postgres
  ports:
    - port: 5432
      targetPort: 5432

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-postgres
  namespace: distributed-systems-project2026
spec:
  serviceName: auth-postgres
  replicas: 1
  selector:
    matchLabels:
      app: auth-postgres
  template:
    metadata:
      labels:
        app: auth-postgres
    spec:
      containers:
        - name: auth-postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: AUTH_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: AUTH_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: auth-postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: auth-postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

apiVersion: v1
kind: Namespace
metadata:
  name: distributed-systems-project2026

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: distributed-systems-project2026
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: ds-project/ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth:8000"
            - name: MANAGER_SERVICE_URL
              value: "http://manager:8000"

---

apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: distributed-systems-project2026
spec:
  type: NodePort
  selector:
    app: ui
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080

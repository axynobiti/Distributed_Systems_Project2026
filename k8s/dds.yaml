apiVersion: v1
kind: Secret
metadata:
  name: dds-postgres-secret
  namespace: distributed-systems-project2026
type: Opaque
stringData:
  DDS_DB_PASSWORD: "dds_password"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: dds-postgres-config
  namespace: distributed-systems-project2026
data:
  DDS_DB_HOST: "dds-postgres"
  DDS_DB_PORT: "5432"
  DDS_DB_NAME: "dds_db"
  DDS_DB_USER: "dds_user"

---

apiVersion: v1
kind: Service
metadata:
  name: dds-postgres
  namespace: distributed-systems-project2026
spec:
  type: ClusterIP
  selector:
    app: dds-postgres
  ports:
    - port: 5432
      targetPort: 5432

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dds-postgres
  namespace: distributed-systems-project2026
spec:
  serviceName: dds-postgres
  replicas: 1
  selector:
    matchLabels:
      app: dds-postgres
  template:
    metadata:
      labels:
        app: dds-postgres
    spec:
      containers:
        - name: dds-postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: dds-postgres-config
                  key: DDS_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: dds-postgres-config
                  key: DDS_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dds-postgres-secret
                  key: DDS_DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: dds-postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: dds-postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
